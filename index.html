<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>OmniCode Ultimate - Debug 模式</title>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; }
        body, html { margin: 0; padding: 0; height: 100vh; display: flex; background: var(--bg); color: #fff; font-family: sans-serif; }
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
        #editor-container { flex: 1; height: 100vh; background: #000; position: relative; }
        .status-tag { padding: 5px; font-size: 12px; border-radius: 3px; text-align: center; }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        .loading { background: #f39c12; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #log { font-size: 11px; color: #aaa; margin-top: 20px; overflow-y: auto; flex: 1; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>OmniCode 終極版</h3>
        <div id="editor-status" class="status-tag loading">正在載入編輯器引擎...</div>
        <button id="open-btn" class="btn" disabled onclick="openFile()">📂 開啟檔案</button>
        <button id="save-btn" class="btn" disabled onclick="saveFile()">💾 儲存檔案</button>
        <div id="log">--- 系統日誌 ---<br></div>
    </div>

    <div id="editor-container">
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script>
        let editor;
        let fileHandle;

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `> ${msg}<br>`;
            console.log(msg);
        }

        // 1. 強制檢查環境
        if (!window.showOpenFilePicker) {
            addLog("錯誤：你的瀏覽器不支援 File System API (請使用 Chrome/Edge)");
            document.getElementById('editor-status').innerHTML = "瀏覽器不支援 API";
            document.getElementById('editor-status').className = "status-tag error";
        }

        // 2. 初始化 Monaco
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            try {
                editor = monaco.editor.create(document.getElementById('editor-container'), {
                    value: "// 引擎載入成功，請開啟檔案\n",
                    language: 'javascript',
                    theme: 'vs-dark',
                    automaticLayout: true
                });
                
                addLog("編輯器引擎載入完成");
                document.getElementById('editor-status').innerHTML = "引擎已就緒";
                document.getElementById('editor-status').className = "status-tag success";
                document.getElementById('open-btn').disabled = false;
                document.getElementById('save-btn').disabled = false;
            } catch (e) {
                addLog("渲染失敗: " + e.message);
            }
        });

        async function openFile() {
            try {
                [fileHandle] = await window.showOpenFilePicker();
                const file = await fileHandle.getFile();
                const text = await file.text();
                
                addLog(`讀取檔案: ${file.name} (${file.size} bytes)`);

                // 核心修復：確保編輯器實例存在再填入內容
                if (editor) {
                    editor.setValue(text);
                    // 自動偵測語言
                    const ext = file.name.split('.').pop();
                    const model = editor.getModel();
                    // 簡單對照表
                    const lang = ext === 'py' ? 'python' : ext === 'html' ? 'html' : 'javascript';
                    monaco.editor.setModelLanguage(model, lang);
                } else {
                    addLog("錯誤：編輯器尚未準備好");
                }
            } catch (err) {
                addLog("開啟失敗: " + err.message);
            }
        }

        async function saveFile() {
            if (!fileHandle) return addLog("請先開啟檔案");
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(editor.getValue());
                await writable.close();
                addLog("檔案儲存成功！");
            } catch (err) {
                addLog("儲存失敗: " + err.message);
            }
        }
    </script>
</body>
</html>
